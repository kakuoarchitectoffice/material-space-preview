<!doctype html>
<html lang="ja" class="is-locked">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="空間を歩き、素材に出会う。タイルから空間を構想する限定公開デジタルショールーム。">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>tiles SPACE — Digital Showroom</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="access.js" defer></script>
</head>
<body>
  <section class="access-gate" id="access-gate" aria-labelledby="access-title">
    <div class="access-gate__visual" aria-hidden="true"></div>
    <div class="access-gate__panel">
      <p class="micro">PRIVATE PREVIEW</p>
      <h1 id="access-title">tiles <span>SPACE</span></h1>
      <p>このサイトは限定公開です。<br>閲覧用パスワードを入力してください。</p>
      <form class="access-form" novalidate>
        <label for="access-password">PASSWORD</label>
        <div><input id="access-password" name="password" type="password" autocomplete="current-password" required><button type="submit">ENTER</button></div>
        <p class="access-error" role="alert" aria-live="polite"></p>
      </form>
      <small>CONCEPT DEMO / AUTHORIZED VIEWERS ONLY</small>
    </div>
  </section>

  <div id="app" aria-live="polite"></div>

  <dialog class="material-dialog" id="material-dialog" aria-labelledby="material-dialog-title">
    <button class="dialog-close" type="button">閉じる</button>
    <div class="dialog-media"><img alt=""></div>
    <div class="dialog-copy">
      <p class="micro">DEMO TILE / 正式商品選定前</p>
      <h2 id="material-dialog-title"></h2>
      <p class="dialog-description"></p>
      <dl class="spec-list"></dl>
      <p class="demo-note">この商品情報はデモ表示です。正式な商品名・品番・仕様は選定後に確認してください。</p>
      <div class="dialog-actions">
        <button type="button" data-dialog-favorite></button>
        <button type="button" data-dialog-sample>サンプル候補に追加</button>
        <a href="?view=showroom" data-dialog-space>使用空間を見る</a>
      </div>
    </div>
  </dialog>

  <div class="toast" role="status" aria-live="polite"></div>
  <script src="demo-data.js"></script>
  <script src="script.js"></script>
  <script src="project.js"></script>
</body>
</html>
